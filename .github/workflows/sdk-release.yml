name: SDK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run release pipeline without publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate quality gate
        run: |
          npm run -s lint
          npm run -s typecheck
          npm run -s test
          npm run -s build

      - name: Create npm package tarball
        run: npm pack --pack-destination /tmp

      - name: Upload release candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-release-candidate
          path: /tmp/*.tgz

      - name: Publish to npm
        if: >-
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/v') &&
          env.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
