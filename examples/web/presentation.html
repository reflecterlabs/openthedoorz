<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open The Doorz | Infraestructura Soberana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fdfbf7;
        --accent: #ff5733;
        --text: #2f241f;
        --muted: #6f6157;
        --card: rgba(255, 255, 255, 0.66);
        --border: rgba(255, 87, 51, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Outfit", system-ui, sans-serif;
        background:
          radial-gradient(
            circle at 12% 0%,
            rgba(255, 87, 51, 0.1) 0,
            transparent 42%
          ),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .container {
        width: min(760px, 92vw);
        padding: 22px;
      }

      .hero {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        backdrop-filter: blur(10px);
        padding: 42px 30px;
        box-shadow: 0 20px 45px rgba(80, 58, 47, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.9rem, 4vw, 2.9rem);
        line-height: 1.1;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
        margin: 14px auto 0;
        max-width: 620px;
      }

      .accent {
        background: linear-gradient(120deg, var(--accent), #f4a261);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        justify-content: center;
      }

      .btn {
        border: none;
        border-radius: 14px;
        padding: 12px 28px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #f4a261);
        color: white;
      }

      .btn-secondary {
        background: white;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .reveal {
        margin-top: 22px;
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .logo {
        width: min(240px, 60vw);
        height: auto;
        display: block;
        margin: 0 auto 14px;
        border-radius: 14px;
      }

      .small {
        font-size: 0.93rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>
          Open The Doorz
          <span class="accent">Financial Infrastructure</span>
          para LatAm
        </h1>
        <p>
          Infraestructura financiera soberana para LatAm: on-ramp, neo-banking y
          DeFi treasury para equipos de alto desempeño.
        </p>
        <div class="actions">
          <button id="try-btn" class="btn btn-primary" type="button">
            TRY
          </button>
        </div>
        <div id="try-reveal" class="reveal" aria-live="polite">
          <img
            class="logo"
            src="https://openthedoorz.com/otd.webp"
            alt="Open The Doorz logo"
            loading="lazy"
          />
          <p class="small">Stack listo para demo empresarial.</p>
          <div class="actions" style="margin-top: 10px">
            <a href="/dash" class="btn btn-secondary">Open App</a>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/presentation.ts"></script>
  </body>
</html>
